<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درسِ نظامی | داخلہ فارم</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="program-single.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <section class="program-intro text-center mb-5">
                    <h1 class="fw-bold mb-4 display-5">درسِ نظامی (عالم کورس)</h1>
                    <div class="desc-box bg-white p-4 shadow-sm rounded-4">
                        <p class="fs-5 text-muted mb-4">قرآن و سنت کی گہری سمجھ بوجھ کے لیے آٹھ سالہ مکمل تعلیمی نصاب، جس میں صرف و نحو، منطق، فلسفہ، اور ادب شامل ہے۔</p>
                        
                        <div class="alert alert-warning border-0 shadow-sm d-inline-block px-4">
                            ⚠️ <strong>داخلے کی آخری تاریخ:</strong> 15 اپریل 2026
                        </div>
                    </div>
                </section>

                <div class="form-card shadow border-0 overflow-hidden rounded-4">
                    <header class="form-header text-center py-4 text-white">
                        <h3 class="fw-bold">آن لائن داخلہ فارم</h3>
                        <p class="mb-0 opacity-75">برائے درسِ نظامی - سیشن 2026</p>
                    </header>

                    <div class="form-body p-4 p-md-5 bg-white">
                        <form action="https://formspree.io/f/xdaprlyq" method="POST">
                            <input type="hidden" name="program" value="Dars-e-Nizami">
                            
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label">نام</label>
                                    <input type="text" name="name" class="form-control custom-input" placeholder="اپنا مکمل نام لکھیں" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">والد کا نام</label>
                                    <input type="text" name="father" class="form-control custom-input" placeholder="والد کا نام لکھیں" required>
                                </div>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label">رابطہ نمبر</label>
                                    <input type="tel" name="phone" class="form-control custom-input text-start" dir="ltr" placeholder="03xxxxxxxxx" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">شہر/علاقہ</label>
                                    <input type="text" name="area" class="form-control custom-input" placeholder="اپنا شہر لکھیں">
                                </div>
                            </div>

                            <button type="submit" class="btn submit-btn w-100 py-3 fw-bold shadow-sm">درخواست جمع کروائیں</button>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a href="programs.html" class="text-decoration-none text-success">← واپس تمام پروگرامز دیکھیں</a>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
