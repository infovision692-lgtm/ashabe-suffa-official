<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شکریہ - دارالعلوم اصحابِ صفہ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Nastaliq Urdu', serif;
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .thanks-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid #1b5e20;
        }
        .btn-home {
            background-color: #1b5e20;
            color: white;
            border-radius: 50px;
            padding: 10px 30px;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-home:hover {
            background-color: #d4af37;
            color: #1b5e20;
        }
    </style>
</head>
<body>

    <div class="thanks-card">
        <h1 class="text-success mb-4">آپ کا بہت شکریہ!</h1>
        <p class="fs-4 mb-4">آپ کی درخواست ہمیں موصول ہو گئی ہے۔ ہمارا نمائندہ جلد ہی آپ سے رابطہ کرے گا، ان شاء اللہ۔</p>
        <a href="index.html" class="btn-home">ہوم پیج پر واپس جائیں</a>
    </div>

</body>
</html>
