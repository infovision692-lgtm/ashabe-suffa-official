<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دارالافتاء - جامعہ اصحابِ صفہ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans Arabic', sans-serif; background-color: #f4f7f6; }
        h1, h2, h3, .urdu-font { font-family: 'Noto Nastaliq Urdu', serif; line-height: 2.5; }
        .fatwa-card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-gold { background-color: #d4af37; color: white; border-radius: 50px; padding: 10px 30px; border: none; font-weight: bold; }
        .btn-gold:hover { background-color: #b8962d; color: white; }
        .answer-box { display: none; background: #fff; padding: 20px; border-right: 5px solid #1b5e20; margin-top: 20px; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #1b5e20;">
        <div class="container">
            <a class="navbar-brand urdu-font" href="index.html">جامعہ اصحابِ صفہ - دارالافتاء</a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h2 class="text-success mb-4">اپنا شرعی سوال پوچھیں</h2>
                <p class="text-muted">آپ کے سوالات کا جواب فقہ حنفی (ہدایہ) اور معتبر دیوبندی فتاویٰ کی روشنی میں دیا جائے گا۔</p>
                
                <div class="card fatwa-card p-4 mt-4">
                    <div class="mb-3">
                        <textarea id="userQuestion" class="form-control" rows="4" placeholder="مثلاً: وضو کے فرائض کیا ہیں؟ یا زکوٰۃ کا نصاب کیا ہے؟"></textarea>
                    </div>
                    <button onclick="askFatwa()" class="btn btn-gold btn-lg">جواب حاصل کریں</button>
                </div>

                <div id="fatwaResult" class="answer-box text-end shadow-sm">
                    <h4 class="text-success urdu-font">الجواب وباللہ التوفیق:</h4>
                    <div id="answerText" class="fs-5 mb-3"></div>
                    <hr>
                    <p class="small text-muted"><strong>حوالہ جات:</strong> <span id="referenceText"></span></p>
                    <a id="whatsappMufti" href="#" target="_blank" class="btn btn-outline-success btn-sm mt-2">
                        <i class="fab fa-whatsapp"></i> مزید وضاحت کے لیے مفتی صاحب سے پوچھیں
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function askFatwa() {
            const question = document.getElementById('userQuestion').value;
            const resultBox = document.getElementById('fatwaResult');
            const answerText = document.getElementById('answerText');
            const referenceText = document.getElementById('referenceText');
            const whatsappLink = document.getElementById('whatsappMufti');

            if (question.trim() === "") {
                alert("براہ کرم سوال لکھیں!");
                return;
            }

            // عارضی طور پر ایک خودکار جواب کا سسٹم (آپ اسے بعد میں AI سے جوڑ سکتے ہیں)
            answerText.innerText = "آپ کا سوال موصول ہو گیا ہے۔ شرعی اصول کے مطابق، کسی بھی عمل کی قبولیت کے لیے نیت اور سنت کا ہونا ضروری ہے۔";
            referenceText.innerText = "ہدایہ (کتاب الطہارت)، فتاویٰ دارالعلوم دیوبند (جلد اول)۔";
            
            // واٹس ایپ لنک کو سوال کے ساتھ جوڑنا
            whatsappLink.href = "https://wa.me/923059927523?text=السلام علیکم مفتی صاحب! میرا سوال یہ ہے: " + encodeURIComponent(question);
            
            resultBox.style.display = "block";
        }
    </script>

</body>
</html>
