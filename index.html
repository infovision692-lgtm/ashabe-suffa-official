<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اصحابِ صفہ آفیشل - مدرسہ پورٹل</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Noto+Sans+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-green: #1b5e20;
            --gold: #d4af37;
            --light-bg: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            color: #333;
            overflow-x: hidden;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate { animation: fadeInUp 0.8s ease-out forwards; }

        /* Header & Navigation */
        header {
            background-color: var(--primary-green);
            color: var(--gold);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 4px solid var(--gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 {
            font-family: 'Noto Nastaliq Urdu', serif;
            margin: 0;
            font-size: 2.5rem;
        }

        nav {
            background: var(--white);
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        nav a {
            text-decoration: none;
            color: var(--primary-green);
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover { color: var(--gold); }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(27, 94, 32, 0.8), rgba(27, 94, 32, 0.8)), url('https://images.unsplash.com/photo-1590076175572-e00940656a1b?auto=format&fit=crop&q=80') center/cover;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            flex-direction: column;
        }

        /* Form Styling */
        .container {
            max-width: 800px;
            margin: -50px auto 50px;
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary-green); }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Noto Sans Arabic';
        }

        .submit-btn {
            background: var(--primary-green);
            color: var(--gold);
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
        }

        .submit-btn:hover { background: #144618; transform: scale(1.02); }

        /* Floating WhatsApp Button */
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="animate">اصحابِ صفہ آفیشل</h1>
        <p>تعلیمِ دین کا معتبر ادارہ</p>
    </header>

    <nav>
        <a href="#home">ہوم</a>
        <a href="#admission">داخلہ فارم</a>
        <a href="#contact">رابطہ</a>
    </nav>

    <section class="hero">
        <h2 class="animate" style="font-size: 3rem;">آن لائن داخلہ شروع ہے</h2>
        <p class="animate">علمِ دین سیکھنے کے لیے آج ہی رجسٹر ہوں</p>
    </section>

    <div class="container animate" id="admission">
        <h2 style="text-align: center; color: var(--primary-green);">داخلہ فارم</h2>
        <form>
            <div class="form-group">
                <label>طالب علم کا نام</label>
                <input type="text" placeholder="نام لکھیں...">
            </div>
            <div class="form-group">
                <label>مطلوبہ درجہ (Class)</label>
                <select>
                    <option>حفظ القرآن</option>
                    <option>تجوید و قرات</option>
                    <option>اولٰی</option>
                    <option>ثانیہ</option>
                    <option>تخصص (Specilization)</option>
                    <option>دورہ حدیث</option>
                </select>
            </div>
            <div class="form-group">
                <label>رابطہ نمبر</label>
                <input type="tel" placeholder="0300-0000000">
            </div>
            <button type="submit" class="submit-btn">درخواست جمع کروائیں</button>
        </form>
    </div>

    <a href="https://wa.me/923261937058" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer style="text-align: center; padding: 20px; color: #666;">
        &copy; 2026 اصحابِ صفہ آفیشل - جملہ حقوق محفوظ ہیں۔
    </footer>

</body>
</html>
